<!-- Button Event Delegation Script -->
<script>
(function() {
    'use strict';
    
    // Event delegation untuk tombol dengan data-action
    document.addEventListener('click', function(e) {
        const button = e.target.closest('[data-action]');
        if (!button) return;
        
        const action = button.dataset.action;
        const handler = window['handle' + action.charAt(0).toUpperCase() + action.slice(1)];
        
        if (typeof handler === 'function') {
            handler.call(button, e);
        } else {
            console.warn('Handler not found for action:', action);
        }
    });
    
    // Default handlers untuk common actions
    window.handleAdd = function(e) {
        console.log('Add button clicked', this);
        // Implementasi akan ditambahkan di module masing-masing
    };
    
    window.handleEdit = function(e) {
        console.log('Edit button clicked', this);
        // Implementasi akan ditambahkan di module masing-masing
    };
    
    window.handleDelete = function(e) {
        console.log('Delete button clicked', this);
        // Implementasi akan ditambahkan di module masing-masing
    };
    
    window.handleDownload = function(e) {
        console.log('Download button clicked', this);
        // Implementasi akan ditambahkan di module masing-masing
    };
    
    window.handleImport = function(e) {
        console.log('Import button clicked', this);
        // Implementasi akan ditambahkan di module masing-masing
    };
    
    window.handleExport = function(e) {
        console.log('Export button clicked', this);
        // Implementasi akan ditambahkan di module masing-masing
    };
    
    window.handleSave = function(e) {
        console.log('Save button clicked', this);
        // Implementasi akan ditambahkan di module masing-masing
    };
    
    window.handleCancel = function(e) {
        console.log('Cancel button clicked', this);
        // Implementasi akan ditambahkan di module masing-masing
    };
})();
</script>
