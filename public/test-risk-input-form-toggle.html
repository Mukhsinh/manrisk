<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Risk Input Form Toggle</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/risk-input.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .test-pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .test-fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .test-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <h1><i class="fas fa-vial"></i> Test Risk Input Form Toggle</h1>
    
    <div class="test-section">
        <h3>Status Awal Halaman</h3>
        <div id="initial-status"></div>
    </div>

    <div class="test-section">
        <h3>Test Tombol Tambah Risiko</h3>
        <button class="btn btn-primary" id="btn-tambah-risiko">
            <i class="fas fa-plus"></i> Tambah Risiko
        </button>
        <div id="button-test-result"></div>
    </div>

    <div class="test-section">
        <h3>Form Input Risiko</h3>
        <div id="risk-input-form-section" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h4>Form Input Risiko</h4>
                </div>
                <div class="card-body">
                    <!-- Analisis Inherent -->
                    <div class="form-section">
                        <h4>Analisis Risiko Inherent</h4>
                        <div class="form-group">
                            <label for="inherent-probability">Probabilitas (1-5)</label>
                            <input type="number" id="inherent-probability" class="form-control" min="1" max="5">
                        </div>
                    </div>

                    <!-- Analisis Residual -->
                    <div class="form-section">
                        <h4>Analisis Risiko Residual</h4>
                        <div class="form-group">
                            <label for="residual-probability">Probabilitas Residual (1-5)</label>
                            <input type="number" id="residual-probability" class="form-control" min="1" max="5">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Helper functions
        const getEl = (id) => document.getElementById(id);
        
        function checkInitialState() {
            const formSection = getEl('risk-input-form-section');
            const inherentProb = getEl('inherent-probability');
            const residualProb = getEl('residual-probability');
            
            const results = [];
            
            // Check form section
            const formDisplay = window.getComputedStyle(formSection).display;
            if (formDisplay === 'none') {
                results.push('<div class="test-result test-pass"><i class="fas fa-check"></i> ✓ Form section tersembunyi (display: none)</div>');
            } else {
                results.push('<div class="test-result test-fail"><i class="fas fa-times"></i> ✗ Form section TIDAK tersembunyi (display: ' + formDisplay + ')</div>');
            }
            
            // Check inherent section
            if (inherentProb) {
                const inherentSection = inherentProb.closest('.form-section');
                if (inherentSection) {
                    const inherentDisplay = window.getComputedStyle(inherentSection).display;
                    results.push('<div class="test-result test-info"><i class="fas fa-info-circle"></i> Section Analisis Inherent: ' + inherentDisplay + '</div>');
                }
            }
            
            // Check residual section
            if (residualProb) {
                const residualSection = residualProb.closest('.form-section');
                if (residualSection) {
                    const residualDisplay = window.getComputedStyle(residualSection).display;
                    results.push('<div class="test-result test-info"><i class="fas fa-info-circle"></i> Section Analisis Residual: ' + residualDisplay + '</div>');
                }
            }
            
            getEl('initial-status').innerHTML = results.join('');
        }
        
        function showFormSection() {
            const formSection = getEl('risk-input-form-section');
            if (formSection) {
                formSection.style.display = 'block';
            }
        }
        
        function hideAnalysisSections() {
            const inherentProb = getEl('inherent-probability');
            const residualProb = getEl('residual-probability');
            
            if (inherentProb) {
                const inherentSection = inherentProb.closest('.form-section');
                if (inherentSection) {
                    inherentSection.style.display = 'none';
                }
            }
            
            if (residualProb) {
                const residualSection = residualProb.closest('.form-section');
                if (residualSection) {
                    residualSection.style.display = 'none';
                }
            }
        }
        
        function testButtonClick() {
            const results = [];
            
            // Show form
            showFormSection();
            
            // Hide analysis sections
            hideAnalysisSections();
            
            // Check results
            const formSection = getEl('risk-input-form-section');
            const formDisplay = window.getComputedStyle(formSection).display;
            
            if (formDisplay === 'block') {
                results.push('<div class="test-result test-pass"><i class="fas fa-check"></i> ✓ Form section ditampilkan (display: block)</div>');
            } else {
                results.push('<div class="test-result test-fail"><i class="fas fa-times"></i> ✗ Form section TIDAK ditampilkan (display: ' + formDisplay + ')</div>');
            }
            
            // Check inherent section
            const inherentProb = getEl('inherent-probability');
            if (inherentProb) {
                const inherentSection = inherentProb.closest('.form-section');
                if (inherentSection) {
                    const inherentDisplay = window.getComputedStyle(inherentSection).display;
                    if (inherentDisplay === 'none') {
                        results.push('<div class="test-result test-pass"><i class="fas fa-check"></i> ✓ Section Analisis Inherent tersembunyi</div>');
                    } else {
                        results.push('<div class="test-result test-fail"><i class="fas fa-times"></i> ✗ Section Analisis Inherent TIDAK tersembunyi (display: ' + inherentDisplay + ')</div>');
                    }
                }
            }
            
            // Check residual section
            const residualProb = getEl('residual-probability');
            if (residualProb) {
                const residualSection = residualProb.closest('.form-section');
                if (residualSection) {
                    const residualDisplay = window.getComputedStyle(residualSection).display;
                    if (residualDisplay === 'none') {
                        results.push('<div class="test-result test-pass"><i class="fas fa-check"></i> ✓ Section Analisis Residual tersembunyi</div>');
                    } else {
                        results.push('<div class="test-result test-fail"><i class="fas fa-times"></i> ✗ Section Analisis Residual TIDAK tersembunyi (display: ' + residualDisplay + ')</div>');
                    }
                }
            }
            
            getEl('button-test-result').innerHTML = results.join('');
        }
        
        // Run initial check
        document.addEventListener('DOMContentLoaded', () => {
            checkInitialState();
            
            // Bind button
            const btn = getEl('btn-tambah-risiko');
            if (btn) {
                btn.addEventListener('click', testButtonClick);
            }
        });
    </script>
</body>
</html>
