<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Risk Input Enhanced</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/risk-input-notification.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        .btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        #risk-input-form {
            margin-top: 20px;
            padding: 20px;
            border: 2px solid #007bff;
            border-radius: 8px;
            background: #f8f9fa;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Risk Input Enhancement</h1>
        <p>Test fitur form toggle dan notifikasi untuk halaman Risk Input</p>

        <div class="action-toolbar">
            <button class="btn btn-primary" id="btn-new-risk">
                <i class="fas fa-plus-circle"></i> Tambah Risiko
            </button>
            <button class="btn btn-success" onclick="testSuccessNotification()">
                <i class="fas fa-check"></i> Test Notifikasi Sukses
            </button>
            <button class="btn btn-danger" onclick="testErrorNotification()">
                <i class="fas fa-times"></i> Test Notifikasi Error
            </button>
        </div>

        <form id="risk-input-form" style="display: none;">
            <h3>Form Input Risiko</h3>
            <div class="form-group">
                <label>Unit Kerja</label>
                <select id="nama-unit-kerja">
                    <option value="">Pilih Unit Kerja</option>
                    <option value="1">Unit Kerja 1</option>
                    <option value="2">Unit Kerja 2</option>
                </select>
            </div>
            <div class="form-group">
                <label>Kategori Risiko</label>
                <select id="kategori-risiko">
                    <option value="">Pilih Kategori</option>
                    <option value="1">Kategori 1</option>
                    <option value="2">Kategori 2</option>
                </select>
            </div>
            <div class="form-group">
                <label>Sasaran Risiko</label>
                <textarea id="sasaran" rows="3"></textarea>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-success">Simpan</button>
                <button type="button" class="btn btn-danger" onclick="hideRiskInputForm()">Batal</button>
            </div>
        </form>

        <div id="test-results" style="margin-top: 20px;">
            <h3>Test Results</h3>
            <ul id="test-log"></ul>
        </div>
    </div>

    <script src="/js/risk-input-form-toggle.js"></script>
    
    <script>
        function log(message) {
            const logEl = document.getElementById('test-log');
            const li = document.createElement('li');
            li.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(li);
        }

        function testSuccessNotification() {
            showRiskNotification('Data berhasil disimpan!', 'success');
            log('Notifikasi sukses ditampilkan');
        }

        function testErrorNotification() {
            showRiskNotification('Terjadi kesalahan saat menyimpan data!', 'error');
            log('Notifikasi error ditampilkan');
        }

        // Test form submit
        document.getElementById('risk-input-form').addEventListener('submit', function(e) {
            e.preventDefault();
            log('Form submitted');
            showRiskNotification('Data risiko berhasil disimpan!', 'success');
            setTimeout(() => {
                hideRiskInputForm();
                log('Form disembunyikan');
            }, 2000);
        });

        // Log initial state
        window.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('risk-input-form');
            log('Form initial display: ' + form.style.display);
            log('Enhancement loaded successfully');
        });
    </script>
</body>
</html>
